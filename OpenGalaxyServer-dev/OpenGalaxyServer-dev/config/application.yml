    patch: ${APPLICATION_GAME_PATCH:v2022.2.pro-dev}
    whitelist: ${APPLICATION_GAME_WHITELIST:60be1e9b8671b76f94bd23fb}
    register: ${APPLICATION_GAME_REGISTER:false}
    login: ${APPLICATION_GAME_LOGIN:false}
    maintenance: ${APPLICATION_GAME_MAINTENANCE:true}
    ip: ${APPLICATION_GAME_IP:0.0.0.0}
    external-ip: ${APPLICATION_GAME_EXTERNAL_IP:127.0.0.1}
    timeout: ${APPLICATION_GAME_TIMEOUT:70}
    interval: ${APPLICATION_GAME_INTERVAL:100}
    fast-ship-building: ${APPLICATION_GAME_FAST_SHIP_BUILDING:false}
    fast-corp-upgrade: ${APPLICATION_GAME_FAST_CORP_UPGRADE:false}
    resources-url: ${APPLICATION_GAME_RESOURCES_URL:}

    test-mode: ${APPLICATION_GAME_TEST_MODE:false}
    fast-transmission: ${APPLICATION_GAME_FAST_TRANSMISSION:false}
    verbose: ${APPLICATION_GAME_VERBOSE:1}
    fast-rbp: ${APPLICATION_GAME_FAST_RBP:false}
    gelf-endpoint: ${APPLICATION_GAME_GELF_ENDPOINT:}
    gelf-scope: ${APPLICATION_GAME_GELF_SCOPE:beta}
    hcaptcha-secret: ${HCAPTCHA_SECRET:}
    smtp-host: ${SMTP_HOST:}
    smtp-username: ${SMTP_USERNAME:}
    smtp-password: ${SMTP_PASSWORD:}
    default-admin-username: ${ADMIN_USERNAME:}
    default-admin-email: ${ADMIN_EMAIL:}
    default-admin-password: ${ADMIN_PASSWORD:}
    max-users: ${APPLICATION_GAME_MAX_USERS:1}
    phase: ${APPLICATION_GAME_PHASE:-1}
    event-validation: ${EVENT_VALIDATION:}
